services:
  postgres:
    image: postgres:16-alpine
    container_name: connect-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: connect
      POSTGRES_PASSWORD: connect_dev
      POSTGRES_DB: connect_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: connect-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
